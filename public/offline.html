<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B0F17" />
    <title>Maple Street Services — Offline</title>
    <!-- Static offline fallback. Phone number is intentionally hardcoded here because this
         page is served by the service worker with no JS/config. Keep it in sync with
         business.config.ts (phoneE164 / phone) per client. -->
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        padding: 24px;
        text-align: center;
        background: #0B0F17;
        color: #ffffff;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      img {
        width: 220px;
        max-width: 70vw;
      }
      h1 {
        margin: 0;
        font-size: 1.5rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      p {
        margin: 0;
        max-width: 32rem;
        color: #cbd5e1;
      }
      .call {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 6px;
        padding: 16px 28px;
        border-radius: 10px;
        background: #2563EB;
        color: #fff;
        font-size: 1.25rem;
        font-weight: 700;
        text-decoration: none;
      }
      .muted {
        font-size: 0.85rem;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <img src="/brand/logo-primary-banner.png" alt="Maple Street Services" />
    <h1>You're offline</h1>
    <p>No internet connection right now. If you need help, call us and we'll take care of it.</p>
    <a class="call" href="tel:+15550100100">(555) 010-0100</a>
    <p class="muted">Maple Street Services · 100 Maple Street, Springfield, IL 60000</p>
  </body>
</html>
