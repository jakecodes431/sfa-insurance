<!-- Subject: Your verification code -->
<!-- Rendered by the send-auth-email hook. Tokens: {{logo_block}} {{business_name}}
     {{primary_color}} {{token}} {{site_url}} -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light only" />
    <title>Your verification code</title>
  </head>
  <body style="margin:0;padding:0;background:#f4f5f7;">
    <span style="display:none!important;visibility:hidden;opacity:0;height:0;width:0;overflow:hidden;mso-hide:all;">Your one-time verification code.</span>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f5f7;">
      <tr>
        <td align="center" style="padding:32px 16px;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:465px;background:#ffffff;border:1px solid #e6e8eb;border-radius:12px;">
            <tr>
              <td style="padding:32px 32px 8px 32px;font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">{{logo_block}}</td>
            </tr>
            <tr>
              <td style="padding:8px 32px 0 32px;font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
                <h1 style="margin:0 0 12px 0;font-size:21px;line-height:1.3;color:#111827;font-weight:700;">Your verification code</h1>
                <p style="margin:0 0 20px 0;font-size:15px;line-height:1.6;color:#374151;">Enter this code to confirm it's you at {{business_name}}:</p>
                <div style="margin:0 0 24px 0;padding:16px 0;text-align:center;background:#f4f6fb;border:1px solid #e3e8f0;border-radius:10px;font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:30px;font-weight:700;letter-spacing:8px;color:#111827;">{{token}}</div>
                <p style="margin:0 0 28px 0;font-size:13px;line-height:1.6;color:#6b7280;">This code expires in 1 hour. If you didn't request it, you can safely ignore this email.</p>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 32px 28px 32px;border-top:1px solid #eef0f2;font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
                <p style="margin:0;font-size:12px;line-height:1.6;color:#9ca3af;">Sent by <a href="{{site_url}}" style="color:#9ca3af;text-decoration:underline;">{{business_name}}</a></p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
